name: Deploy Sembix Studio

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Sembix Studio version to deploy (e.g., v1.2.3, main)'
        required: true
        type: string
      terraform_ref:
        description: 'Terraform workflow version (tag, branch, or commit)'
        required: false
        type: string
        default: 'v7.0.2'
      environment:
        description: 'Target environment (e.g., dev, prod, customer-specific)'
        required: true
        type: string
      deployment_phase:
        description: 'Deployment phase: bootstrap (first-time setup), deploy (infrastructure + migrations + UI), migrations (migrations ONLY)'
        required: true
        type: choice
        default: deploy
        options:
          - bootstrap
          - deploy
          - migrations
      require_approval:
        description: 'Require manual approval before deploying'
        type: boolean
        default: true
      cloud_provider:
        description: 'Cloud provider to deploy to'
        required: true
        type: choice
        default: aws
        options:
          - aws
          - azure

jobs:
  # Step 1a: Validate bootstrap configuration (runs only for bootstrap phase)
  validate-bootstrap:
    if: inputs.deployment_phase == 'bootstrap'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: sembix-ai

      - name: Checkout Deployment Code
        uses: actions/checkout@v3
        with:
          token: ${{ github.token }}

      - name: Checkout Terraform Infrastructure
        uses: actions/checkout@v3
        with:
          repository: sembix-ai/sembix-studio-infrastructure
          token: ${{ steps.generate-token.outputs.token }}
          path: terraform-infra
          ref: ${{ inputs.terraform_ref }}

      - name: Validate bootstrap configuration
        uses: ./terraform-infra/.github/actions/validate-bootstrap-configuration
        with:
          version: ${{ inputs.version }}
          environment: ${{ inputs.environment }}
          cloud_provider: ${{ inputs.cloud_provider }}
          auth_method: 'oidc'
          aws_region: ${{ secrets.AWS_REGION }}
          tf_bucket_name: ${{ vars.TF_BUCKET_NAME }}
          customer_role_arn: ${{ secrets.CUSTOMER_ROLE_ARN }}
          iam_role_path: ${{ secrets.IAM_ROLE_PATH }}

          # Azure Authentication
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          # Azure Configuration
          azure_location: ${{ secrets.AZURE_LOCATION }}
          azure_location_short: ${{ secrets.AZURE_LOCATION_SHORT }}

          # Azure TF State
          tf_storage_account_name: ${{ secrets.TF_STORAGE_ACCOUNT_NAME }}
          tf_container_name: ${{ secrets.TF_CONTAINER_NAME }}
          tf_resource_group_name: ${{ secrets.TF_RESOURCE_GROUP_NAME }}

  # Step 1b: Validate deploy configuration (runs only for deploy phase)
  validate-deploy:
    if: inputs.deployment_phase == 'deploy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: sembix-ai

      - name: Checkout Sembix Studio code
        uses: actions/checkout@v3
        with:
          token: ${{ github.token }}

      - name: Checkout Terraform Infrastructure
        uses: actions/checkout@v3
        with:
          repository: sembix-ai/sembix-studio-infrastructure
          token: ${{ steps.generate-token.outputs.token }}
          path: terraform-infra
          ref: ${{ inputs.terraform_ref }}

      - name: Validate deploy configuration
        uses: ./terraform-infra/.github/actions/validate-deploy-configuration
        with:
          version: ${{ inputs.version }}
          environment: ${{ inputs.environment }}
          cloud_provider: ${{ inputs.cloud_provider }}
          auth_method: 'oidc'
          aws_region: ${{ secrets.AWS_REGION }}
          tf_bucket_name: ${{ vars.TF_BUCKET_NAME }}
          customer_role_arn: ${{ secrets.CUSTOMER_ROLE_ARN }}

          # ECR Repositories
          engine_ecr_repository_url: ${{ secrets.ENGINE_ECR_REPOSITORY_URL }}
          migrations_ecr_repository_url: ${{ secrets.MIGRATIONS_ECR_REPOSITORY_URL }}
          bff_ecr_repository_url: ${{ secrets.BFF_ECR_REPOSITORY_URL }}
          semantic_event_engine_ecr_repository_url: ${{ secrets.SEMANTIC_EVENT_ENGINE_ECR_REPOSITORY_URL }}
          workspace_runtime_ecr_repository_url: ${{ secrets.WORKSPACE_RUNTIME_ECR_REPOSITORY_URL }}

          # Sembix Hub & Cross Account
          sembix_hub_aws_account_id: ${{ secrets.SEMBIX_HUB_AWS_ACCOUNT_ID }}
          sembix_hub_studio_secret_name: ${{ secrets.SEMBIX_HUB_STUDIO_SECRET_NAME }}
          sembix_hub_studio_kms_key_id: ${{ secrets.SEMBIX_HUB_STUDIO_KMS_KEY_ID }}
          sembix_hub_consumer_role_arn: ${{ secrets.SEMBIX_HUB_HUB_CONSUMER_ROLE_ARN }}
          sembix_hub_admin_role_arn: ${{ secrets.SEMBIX_HUB_HUB_ADMIN_ROLE_ARN }}
          sembix_hub_app_config_role_arn: ${{ secrets.SEMBIX_HUB_APP_CONFIG_ROLE_ARN }}
          sembix_hub_app_config_app_id: ${{ secrets.SEMBIX_HUB_APP_CONFIG_APP_ID }}
          sembix_hub_app_config_env_id: ${{ secrets.SEMBIX_HUB_APP_CONFIG_ENV_ID }}
          sembix_hub_app_config_profile_id: ${{ secrets.SEMBIX_HUB_APP_CONFIG_PROFILE_ID }}
          sembix_hub_engine_execution_role: ${{ secrets.SEMBIX_HUB_ENGINE_EXECUTION_ROLE }}
          customer_portal_hub_base_url: ${{ secrets.CUSTOMER_PORTAL_CENTRAL_HUB_API_URL }}
          customer_portal_hub_role_arn: ${{ secrets.CUSTOMER_PORTAL_CENTRAL_HUB_ROLE_ARN }}

          # Database
          sembix_studio_db_name: ${{ secrets.SEMBIX_STUDIO_DB_NAME }}
          sembix_studio_user: ${{ secrets.SEMBIX_STUDIO_USER }}

          # Storage
          sembix_studio_artifact_s3_bucket: ${{ secrets.SEMBIX_STUDIO_ARTIFACT_S3_BUCKET }}

          # Optional configurations
          use_custom_networking: ${{ secrets.USE_CUSTOM_NETWORKING }}
          custom_vpc_id: ${{ secrets.CUSTOM_VPC_ID }}
          custom_public_subnet_ids: ${{ secrets.CUSTOM_PUBLIC_SUBNET_IDS }}
          custom_private_subnet_ids: ${{ secrets.CUSTOM_PRIVATE_SUBNET_IDS }}
          use_custom_iam_policies: ${{ secrets.USE_CUSTOM_IAM_POLICIES }}
          workflow_engine_execution_role_arn: ${{ secrets.WORKFLOW_ENGINE_EXECUTION_ROLE_ARN }}
          workflow_engine_task_role_arn: ${{ secrets.WORKFLOW_ENGINE_TASK_ROLE_ARN }}
          bff_ecs_task_execution_role_arn: ${{ secrets.BFF_ECS_TASK_EXECUTION_ROLE_ARN }}
          bff_ecs_task_role_arn: ${{ secrets.BFF_ECS_TASK_ROLE_ARN }}
          rds_proxy_role_arn: ${{ secrets.RDS_PROXY_ROLE_ARN }}
          semantic_event_engine_execution_role_arn: ${{ secrets.SEMANTIC_EVENT_ENGINE_EXECUTION_ROLE_ARN }}
          semantic_event_engine_task_role_arn: ${{ secrets.SEMANTIC_EVENT_ENGINE_TASK_ROLE_ARN }}
          use_custom_security_groups: ${{ secrets.USE_CUSTOM_SECURITY_GROUPS }}
          custom_workflow_engine_sg_id: ${{ secrets.CUSTOM_WORKFLOW_ENGINE_SG_ID }}
          custom_aurora_sg_id: ${{ secrets.CUSTOM_AURORA_SG_ID }}
          custom_rds_proxy_sg_id: ${{ secrets.CUSTOM_RDS_PROXY_SG_ID }}
          custom_bff_ecs_sg_id: ${{ secrets.CUSTOM_BFF_ECS_SG_ID }}
          custom_semantic_event_engine_sg_id: ${{ secrets.CUSTOM_SEMANTIC_EVENT_ENGINE_SG_ID }}
          custom_workspace_runtime_efs_sg_id: ${{ secrets.CUSTOM_WORKSPACE_RUNTIME_EFS_SG_ID }}
          certificate_arn: ${{ secrets.CERTIFICATE_ARN }}
          bff_alb_certificate_arn: ${{ secrets.BFF_ALB_CERTIFICATE_ARN }}
          bff_alb_internal: ${{ secrets.BFF_ALB_INTERNAL }}
          bff_alb_ingress_cidr_blocks: ${{ secrets.BFF_ALB_INGRESS_CIDR_BLOCKS }}
          private_ca_cert_secret_arn: ${{ secrets.PRIVATE_CA_CERT_SECRET_ARN }}
          sembix_studio_cf_viewer_cert: ${{ secrets.SEMBIX_STUDIO_CF_VIEWER_CERT }}

          # Azure Authentication
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          # Azure Configuration
          azure_location: ${{ secrets.AZURE_LOCATION }}

          # Azure TF State
          tf_storage_account_name: ${{ secrets.TF_STORAGE_ACCOUNT_NAME }}
          tf_container_name: ${{ secrets.TF_CONTAINER_NAME }}
          tf_resource_group_name: ${{ secrets.TF_RESOURCE_GROUP_NAME }}

          # Azure Container Images
          workflow_engine_image: ${{ secrets.WORKFLOW_ENGINE_IMAGE }}
          bff_image: ${{ secrets.BFF_IMAGE }}
          semantic_event_engine_image: ${{ secrets.SEMANTIC_EVENT_ENGINE_IMAGE }}
          migrations_image: ${{ secrets.MIGRATIONS_IMAGE }}
          workspace_runtime_image: ${{ secrets.WORKSPACE_RUNTIME_IMAGE }}

          # Azure Database
          postgres_admin_username: ${{ secrets.POSTGRES_ADMIN_USERNAME }}
          postgres_database_name: ${{ secrets.POSTGRES_DATABASE_NAME }}

          # Azure Bootstrap State
          bootstrap_resource_group_name: ${{ secrets.BOOTSTRAP_RESOURCE_GROUP_NAME }}
          bootstrap_storage_account_name: ${{ secrets.BOOTSTRAP_STORAGE_ACCOUNT_NAME }}
          bootstrap_container_name: ${{ secrets.BOOTSTRAP_CONTAINER_NAME }}
          bootstrap_state_key: ${{ secrets.BOOTSTRAP_STATE_KEY }}

          # Azure Custom Identities
          custom_workflow_engine_identity_id: ${{ secrets.CUSTOM_WORKFLOW_ENGINE_IDENTITY_ID }}
          custom_workflow_engine_identity_principal_id: ${{ secrets.CUSTOM_WORKFLOW_ENGINE_PRINCIPAL_ID }}
          custom_workflow_engine_identity_client_id: ${{ secrets.CUSTOM_WORKFLOW_ENGINE_CLIENT_ID }}
          custom_bff_identity_id: ${{ secrets.CUSTOM_BFF_IDENTITY_ID }}
          custom_bff_identity_principal_id: ${{ secrets.CUSTOM_BFF_PRINCIPAL_ID }}
          custom_bff_identity_client_id: ${{ secrets.CUSTOM_BFF_CLIENT_ID }}
          custom_semantic_event_engine_identity_id: ${{ secrets.CUSTOM_SEMANTIC_EVENT_ENGINE_IDENTITY_ID }}
          custom_semantic_event_engine_identity_principal_id: ${{ secrets.CUSTOM_SEMANTIC_EVENT_ENGINE_PRINCIPAL_ID }}
          custom_semantic_event_engine_identity_client_id: ${{ secrets.CUSTOM_SEMANTIC_EVENT_ENGINE_CLIENT_ID }}
          custom_workspace_runtime_identity_id: ${{ secrets.CUSTOM_WORKSPACE_RUNTIME_IDENTITY_ID }}
          custom_workspace_runtime_identity_principal_id: ${{ secrets.CUSTOM_WORKSPACE_RUNTIME_PRINCIPAL_ID }}
          custom_workspace_runtime_identity_client_id: ${{ secrets.CUSTOM_WORKSPACE_RUNTIME_CLIENT_ID }}
          custom_migrations_identity_id: ${{ secrets.CUSTOM_MIGRATIONS_IDENTITY_ID }}
          custom_migrations_identity_principal_id: ${{ secrets.CUSTOM_MIGRATIONS_PRINCIPAL_ID }}
          custom_migrations_identity_client_id: ${{ secrets.CUSTOM_MIGRATIONS_CLIENT_ID }}

  # Step 1c: Validate migrations configuration (runs only for migrations phase)
  validate-migrations:
    if: inputs.deployment_phase == 'migrations'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: sembix-ai

      - name: Checkout Sembix Studio code
        uses: actions/checkout@v3
        with:
          token: ${{ github.token }}

      - name: Checkout Terraform Infrastructure
        uses: actions/checkout@v3
        with:
          repository: sembix-ai/sembix-studio-infrastructure
          token: ${{ steps.generate-token.outputs.token }}
          path: terraform-infra
          ref: ${{ inputs.terraform_ref }}

      - name: Validate migrations configuration
        uses: ./terraform-infra/.github/actions/validate-deploy-configuration
        with:
          version: ${{ inputs.version }}
          environment: ${{ inputs.environment }}
          cloud_provider: ${{ inputs.cloud_provider }}
          auth_method: 'oidc'
          aws_region: ${{ secrets.AWS_REGION }}
          tf_bucket_name: ${{ vars.TF_BUCKET_NAME }}
          customer_role_arn: ${{ secrets.CUSTOMER_ROLE_ARN }}

          # ECR Repositories
          engine_ecr_repository_url: ${{ secrets.ENGINE_ECR_REPOSITORY_URL }}
          migrations_ecr_repository_url: ${{ secrets.MIGRATIONS_ECR_REPOSITORY_URL }}
          bff_ecr_repository_url: ${{ secrets.BFF_ECR_REPOSITORY_URL }}
          semantic_event_engine_ecr_repository_url: ${{ secrets.SEMANTIC_EVENT_ENGINE_ECR_REPOSITORY_URL }}
          workspace_runtime_ecr_repository_url: ${{ secrets.WORKSPACE_RUNTIME_ECR_REPOSITORY_URL }}

          # Sembix Hub & Cross Account
          sembix_hub_aws_account_id: ${{ secrets.SEMBIX_HUB_AWS_ACCOUNT_ID }}
          sembix_hub_studio_secret_name: ${{ secrets.SEMBIX_HUB_STUDIO_SECRET_NAME }}
          sembix_hub_studio_kms_key_id: ${{ secrets.SEMBIX_HUB_STUDIO_KMS_KEY_ID }}
          sembix_hub_consumer_role_arn: ${{ secrets.SEMBIX_HUB_HUB_CONSUMER_ROLE_ARN }}
          sembix_hub_admin_role_arn: ${{ secrets.SEMBIX_HUB_HUB_ADMIN_ROLE_ARN }}
          sembix_hub_app_config_role_arn: ${{ secrets.SEMBIX_HUB_APP_CONFIG_ROLE_ARN }}
          sembix_hub_app_config_app_id: ${{ secrets.SEMBIX_HUB_APP_CONFIG_APP_ID }}
          sembix_hub_app_config_env_id: ${{ secrets.SEMBIX_HUB_APP_CONFIG_ENV_ID }}
          sembix_hub_app_config_profile_id: ${{ secrets.SEMBIX_HUB_APP_CONFIG_PROFILE_ID }}
          sembix_hub_engine_execution_role: ${{ secrets.SEMBIX_HUB_ENGINE_EXECUTION_ROLE }}
          customer_portal_hub_base_url: ${{ secrets.CUSTOMER_PORTAL_CENTRAL_HUB_API_URL }}
          customer_portal_hub_role_arn: ${{ secrets.CUSTOMER_PORTAL_CENTRAL_HUB_ROLE_ARN }}

          # Database
          sembix_studio_db_name: ${{ secrets.SEMBIX_STUDIO_DB_NAME }}
          sembix_studio_user: ${{ secrets.SEMBIX_STUDIO_USER }}

          # Storage
          sembix_studio_artifact_s3_bucket: ${{ secrets.SEMBIX_STUDIO_ARTIFACT_S3_BUCKET }}

          # Optional configurations
          use_custom_networking: ${{ secrets.USE_CUSTOM_NETWORKING }}
          custom_vpc_id: ${{ secrets.CUSTOM_VPC_ID }}
          custom_public_subnet_ids: ${{ secrets.CUSTOM_PUBLIC_SUBNET_IDS }}
          custom_private_subnet_ids: ${{ secrets.CUSTOM_PRIVATE_SUBNET_IDS }}
          use_custom_iam_policies: ${{ secrets.USE_CUSTOM_IAM_POLICIES }}
          workflow_engine_execution_role_arn: ${{ secrets.WORKFLOW_ENGINE_EXECUTION_ROLE_ARN }}
          workflow_engine_task_role_arn: ${{ secrets.WORKFLOW_ENGINE_TASK_ROLE_ARN }}
          bff_ecs_task_execution_role_arn: ${{ secrets.BFF_ECS_TASK_EXECUTION_ROLE_ARN }}
          bff_ecs_task_role_arn: ${{ secrets.BFF_ECS_TASK_ROLE_ARN }}
          rds_proxy_role_arn: ${{ secrets.RDS_PROXY_ROLE_ARN }}
          semantic_event_engine_execution_role_arn: ${{ secrets.SEMANTIC_EVENT_ENGINE_EXECUTION_ROLE_ARN }}
          semantic_event_engine_task_role_arn: ${{ secrets.SEMANTIC_EVENT_ENGINE_TASK_ROLE_ARN }}
          use_custom_security_groups: ${{ secrets.USE_CUSTOM_SECURITY_GROUPS }}
          custom_workflow_engine_sg_id: ${{ secrets.CUSTOM_WORKFLOW_ENGINE_SG_ID }}
          custom_aurora_sg_id: ${{ secrets.CUSTOM_AURORA_SG_ID }}
          custom_rds_proxy_sg_id: ${{ secrets.CUSTOM_RDS_PROXY_SG_ID }}
          custom_bff_ecs_sg_id: ${{ secrets.CUSTOM_BFF_ECS_SG_ID }}
          custom_semantic_event_engine_sg_id: ${{ secrets.CUSTOM_SEMANTIC_EVENT_ENGINE_SG_ID }}
          custom_workspace_runtime_efs_sg_id: ${{ secrets.CUSTOM_WORKSPACE_RUNTIME_EFS_SG_ID }}
          certificate_arn: ${{ secrets.CERTIFICATE_ARN }}
          bff_alb_certificate_arn: ${{ secrets.BFF_ALB_CERTIFICATE_ARN }}
          bff_alb_internal: ${{ secrets.BFF_ALB_INTERNAL }}
          bff_alb_ingress_cidr_blocks: ${{ secrets.BFF_ALB_INGRESS_CIDR_BLOCKS }}
          private_ca_cert_secret_arn: ${{ secrets.PRIVATE_CA_CERT_SECRET_ARN }}
          sembix_studio_cf_viewer_cert: ${{ secrets.SEMBIX_STUDIO_CF_VIEWER_CERT }}

          # Azure Authentication
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          # Azure Configuration
          azure_location: ${{ secrets.AZURE_LOCATION }}

          # Azure TF State
          tf_storage_account_name: ${{ secrets.TF_STORAGE_ACCOUNT_NAME }}
          tf_container_name: ${{ secrets.TF_CONTAINER_NAME }}
          tf_resource_group_name: ${{ secrets.TF_RESOURCE_GROUP_NAME }}

          # Azure Container Images
          workflow_engine_image: ${{ secrets.WORKFLOW_ENGINE_IMAGE }}
          bff_image: ${{ secrets.BFF_IMAGE }}
          semantic_event_engine_image: ${{ secrets.SEMANTIC_EVENT_ENGINE_IMAGE }}
          migrations_image: ${{ secrets.MIGRATIONS_IMAGE }}
          workspace_runtime_image: ${{ secrets.WORKSPACE_RUNTIME_IMAGE }}

          # Azure Database
          postgres_admin_username: ${{ secrets.POSTGRES_ADMIN_USERNAME }}
          postgres_database_name: ${{ secrets.POSTGRES_DATABASE_NAME }}

          # Azure Bootstrap State
          bootstrap_resource_group_name: ${{ secrets.BOOTSTRAP_RESOURCE_GROUP_NAME }}
          bootstrap_storage_account_name: ${{ secrets.BOOTSTRAP_STORAGE_ACCOUNT_NAME }}
          bootstrap_container_name: ${{ secrets.BOOTSTRAP_CONTAINER_NAME }}
          bootstrap_state_key: ${{ secrets.BOOTSTRAP_STATE_KEY }}

          # Azure Custom Identities
          custom_workflow_engine_identity_id: ${{ secrets.CUSTOM_WORKFLOW_ENGINE_IDENTITY_ID }}
          custom_workflow_engine_identity_principal_id: ${{ secrets.CUSTOM_WORKFLOW_ENGINE_PRINCIPAL_ID }}
          custom_workflow_engine_identity_client_id: ${{ secrets.CUSTOM_WORKFLOW_ENGINE_CLIENT_ID }}
          custom_bff_identity_id: ${{ secrets.CUSTOM_BFF_IDENTITY_ID }}
          custom_bff_identity_principal_id: ${{ secrets.CUSTOM_BFF_PRINCIPAL_ID }}
          custom_bff_identity_client_id: ${{ secrets.CUSTOM_BFF_CLIENT_ID }}
          custom_semantic_event_engine_identity_id: ${{ secrets.CUSTOM_SEMANTIC_EVENT_ENGINE_IDENTITY_ID }}
          custom_semantic_event_engine_identity_principal_id: ${{ secrets.CUSTOM_SEMANTIC_EVENT_ENGINE_PRINCIPAL_ID }}
          custom_semantic_event_engine_identity_client_id: ${{ secrets.CUSTOM_SEMANTIC_EVENT_ENGINE_CLIENT_ID }}
          custom_workspace_runtime_identity_id: ${{ secrets.CUSTOM_WORKSPACE_RUNTIME_IDENTITY_ID }}
          custom_workspace_runtime_identity_principal_id: ${{ secrets.CUSTOM_WORKSPACE_RUNTIME_PRINCIPAL_ID }}
          custom_workspace_runtime_identity_client_id: ${{ secrets.CUSTOM_WORKSPACE_RUNTIME_CLIENT_ID }}
          custom_migrations_identity_id: ${{ secrets.CUSTOM_MIGRATIONS_IDENTITY_ID }}
          custom_migrations_identity_principal_id: ${{ secrets.CUSTOM_MIGRATIONS_PRINCIPAL_ID }}
          custom_migrations_identity_client_id: ${{ secrets.CUSTOM_MIGRATIONS_CLIENT_ID }}

  # Step 2: Bootstrap (conditional, first-time only)
  bootstrap:
    needs: validate-bootstrap
    if: inputs.deployment_phase == 'bootstrap'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: sembix-ai

      - name: Checkout Sembix Studio code
        uses: actions/checkout@v3
        with:
          token: ${{ github.token }}

      - name: Checkout Terraform Infrastructure
        uses: actions/checkout@v3
        with:
          repository: sembix-ai/sembix-studio-infrastructure
          token: ${{ steps.generate-token.outputs.token }}
          path: terraform-infra
          ref: ${{ inputs.terraform_ref }}

      - name: Run bootstrap
        uses: ./terraform-infra/.github/actions/bootstrap-studio
        with:
          version: ${{ inputs.version }}
          environment: ${{ inputs.environment }}
          cloud_provider: ${{ inputs.cloud_provider }}
          require_approval: ${{ inputs.require_approval }}
          aws_region: ${{ secrets.AWS_REGION }}
          tf_bucket_name: ${{ vars.TF_BUCKET_NAME }}
          customer_role_arn: ${{ secrets.CUSTOMER_ROLE_ARN }}
          github_token: ${{ steps.generate-token.outputs.token }}
          approvers: ${{ secrets.DEPLOYMENT_APPROVERS }}
          iam_role_path: ${{ secrets.IAM_ROLE_PATH }}

          # Azure Authentication
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          # Azure Configuration
          azure_location: ${{ secrets.AZURE_LOCATION }}
          azure_location_short: ${{ secrets.AZURE_LOCATION_SHORT }}

          # Azure TF State
          tf_storage_account_name: ${{ secrets.TF_STORAGE_ACCOUNT_NAME }}
          tf_container_name: ${{ secrets.TF_CONTAINER_NAME }}
          tf_resource_group_name: ${{ secrets.TF_RESOURCE_GROUP_NAME }}

  # Step 3: Deploy infrastructure and application
  deploy:
    needs: validate-deploy
    if: inputs.deployment_phase == 'deploy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: sembix-ai

      - name: Checkout Sembix Studio code
        uses: actions/checkout@v3
        with:
          token: ${{ github.token }}

      - name: Checkout Terraform Infrastructure
        uses: actions/checkout@v3
        with:
          repository: sembix-ai/sembix-studio-infrastructure
          token: ${{ steps.generate-token.outputs.token }}
          path: terraform-infra
          ref: ${{ inputs.terraform_ref }}

      - name: Deploy Sembix Studio
        uses: ./terraform-infra/.github/actions/deploy-studio
        with:
          version: ${{ inputs.version }}
          environment: ${{ inputs.environment }}
          cloud_provider: ${{ inputs.cloud_provider }}
          require_approval: ${{ inputs.require_approval }}
          github_token: ${{ steps.generate-token.outputs.token }}

          # AWS Core
          aws_region: ${{ secrets.AWS_REGION }}
          tf_bucket_name: ${{ vars.TF_BUCKET_NAME }}
          customer_role_arn: ${{ secrets.CUSTOMER_ROLE_ARN }}

          # ECR Repositories
          engine_ecr_repository_url: ${{ secrets.ENGINE_ECR_REPOSITORY_URL }}
          migrations_ecr_repository_url: ${{ secrets.MIGRATIONS_ECR_REPOSITORY_URL }}
          bff_ecr_repository_url: ${{ secrets.BFF_ECR_REPOSITORY_URL }}
          semantic_event_engine_ecr_repository_url: ${{ secrets.SEMANTIC_EVENT_ENGINE_ECR_REPOSITORY_URL }}
          workspace_runtime_ecr_repository_url: ${{ secrets.WORKSPACE_RUNTIME_ECR_REPOSITORY_URL }}

          # Sembix Hub & Cross-Account
          sembix_hub_aws_account_id: ${{ secrets.SEMBIX_HUB_AWS_ACCOUNT_ID }}
          sembix_hub_studio_secret_name: ${{ secrets.SEMBIX_HUB_STUDIO_SECRET_NAME }}
          sembix_hub_studio_kms_key_id: ${{ secrets.SEMBIX_HUB_STUDIO_KMS_KEY_ID }}
          sembix_hub_consumer_role_arn: ${{ secrets.SEMBIX_HUB_HUB_CONSUMER_ROLE_ARN }}
          sembix_hub_admin_role_arn: ${{ secrets.SEMBIX_HUB_HUB_ADMIN_ROLE_ARN }}
          sembix_hub_app_config_role_arn: ${{ secrets.SEMBIX_HUB_APP_CONFIG_ROLE_ARN }}
          sembix_hub_app_config_app_id: ${{ secrets.SEMBIX_HUB_APP_CONFIG_APP_ID }}
          sembix_hub_app_config_env_id: ${{ secrets.SEMBIX_HUB_APP_CONFIG_ENV_ID }}
          sembix_hub_app_config_profile_id: ${{ secrets.SEMBIX_HUB_APP_CONFIG_PROFILE_ID }}
          sembix_hub_engine_execution_role: ${{ secrets.SEMBIX_HUB_ENGINE_EXECUTION_ROLE }}
          customer_portal_hub_base_url: ${{ secrets.CUSTOMER_PORTAL_CENTRAL_HUB_API_URL }}
          customer_portal_hub_role_arn: ${{ secrets.CUSTOMER_PORTAL_CENTRAL_HUB_ROLE_ARN }}

          # Billing / Licensing (AWS)
          billing_engine_image_tag: ${{ secrets.BILLING_ENGINE_IMAGE_TAG }}
          billing_hub_role_arn: ${{ secrets.BILLING_HUB_ROLE_ARN }}
          billing_hub_api_gateway_url: ${{ secrets.BILLING_HUB_API_GATEWAY_URL }}
          billing_license_key_secret_arn: ${{ secrets.BILLING_LICENSE_KEY_SECRET_ARN }}
          billing_instance_id: ${{ secrets.BILLING_INSTANCE_ID }}
          billing_enabled: ${{ vars.BILLING_ENABLED }}
          license_refresh_interval_ms: ${{ vars.LICENSE_REFRESH_INTERVAL_MS }}
          billing_config_poll_interval_ms: ${{ vars.BILLING_CONFIG_POLL_INTERVAL_MS }}
          billing_telemetry_poll_interval_ms: ${{ vars.BILLING_TELEMETRY_POLL_INTERVAL_MS }}
          sembix_operator_emails: ${{ vars.SEMBIX_OPERATOR_EMAILS }}

          # Billing (Azure)
          billing_engine_image: ${{ secrets.BILLING_ENGINE_IMAGE }}
          billing_license_key_secret_name: ${{ secrets.BILLING_LICENSE_KEY_SECRET_NAME }}

          # Microsoft Graph (user-invite, optional)
          azure_graph_client_id: ${{ secrets.AZURE_GRAPH_CLIENT_ID }}
          azure_graph_client_secret_arn: ${{ secrets.AZURE_GRAPH_CLIENT_SECRET_ARN }}
          azure_graph_client_secret_name: ${{ secrets.AZURE_GRAPH_CLIENT_SECRET_NAME }}

          # Application Configuration
          org_admin_email: ${{ secrets.ORG_ADMIN_EMAIL }}

          # Database Configuration
          sembix_studio_db_name: ${{ secrets.SEMBIX_STUDIO_DB_NAME }}
          sembix_studio_user: ${{ secrets.SEMBIX_STUDIO_USER }}

          # Networking Configuration
          use_custom_networking: ${{ secrets.USE_CUSTOM_NETWORKING }}
          custom_vpc_id: ${{ secrets.CUSTOM_VPC_ID }}
          custom_public_subnet_ids: ${{ secrets.CUSTOM_PUBLIC_SUBNET_IDS }}
          custom_private_subnet_ids: ${{ secrets.CUSTOM_PRIVATE_SUBNET_IDS }}
          vpc_cidr: ${{ secrets.VPC_CIDR }}
          public_subnet_cidrs: ${{ secrets.PUBLIC_SUBNET_CIDRS }}
          private_subnet_cidrs: ${{ secrets.PRIVATE_SUBNET_CIDRS }}
          az_count: ${{ secrets.AZ_COUNT }}
          enable_vpc_endpoints: ${{ secrets.ENABLE_VPC_ENDPOINTS }}

          # Security Groups
          use_custom_security_groups: ${{ secrets.USE_CUSTOM_SECURITY_GROUPS }}
          custom_workflow_engine_sg_id: ${{ secrets.CUSTOM_WORKFLOW_ENGINE_SG_ID }}
          custom_aurora_sg_id: ${{ secrets.CUSTOM_AURORA_SG_ID }}
          custom_rds_proxy_sg_id: ${{ secrets.CUSTOM_RDS_PROXY_SG_ID }}
          custom_bff_ecs_sg_id: ${{ secrets.CUSTOM_BFF_ECS_SG_ID }}
          custom_bff_alb_sg_id: ${{ secrets.CUSTOM_BFF_ALB_SG_ID }}
          custom_semantic_event_engine_sg_id: ${{ secrets.CUSTOM_SEMANTIC_EVENT_ENGINE_SG_ID }}
          custom_workspace_runtime_efs_sg_id: ${{ secrets.CUSTOM_WORKSPACE_RUNTIME_EFS_SG_ID }}

          # IAM Roles & Policies
          use_custom_iam_policies: ${{ secrets.USE_CUSTOM_IAM_POLICIES }}
          workflow_engine_execution_role_arn: ${{ secrets.WORKFLOW_ENGINE_EXECUTION_ROLE_ARN }}
          workflow_engine_task_role_arn: ${{ secrets.WORKFLOW_ENGINE_TASK_ROLE_ARN }}
          bff_ecs_task_execution_role_arn: ${{ secrets.BFF_ECS_TASK_EXECUTION_ROLE_ARN }}
          bff_ecs_task_role_arn: ${{ secrets.BFF_ECS_TASK_ROLE_ARN }}
          rds_proxy_role_arn: ${{ secrets.RDS_PROXY_ROLE_ARN }}
          semantic_event_engine_execution_role_arn: ${{ secrets.SEMANTIC_EVENT_ENGINE_EXECUTION_ROLE_ARN }}
          semantic_event_engine_task_role_arn: ${{ secrets.SEMANTIC_EVENT_ENGINE_TASK_ROLE_ARN }}
          sembix_studio_notification_role_arn: ${{ secrets.SEMBIX_STUDIO_NOTIFICATION_ROLE_ARN }}

          # TLS/SSL Certificates
          sembix_studio_cf_viewer_cert: ${{ secrets.SEMBIX_STUDIO_CF_VIEWER_CERT }}
          certificate_arn: ${{ secrets.CERTIFICATE_ARN }}
          bff_alb_certificate_arn: ${{ secrets.BFF_ALB_CERTIFICATE_ARN }}
          bff_alb_internal: ${{ secrets.BFF_ALB_INTERNAL }}
          bff_alb_ingress_cidr_blocks: ${{ secrets.BFF_ALB_INGRESS_CIDR_BLOCKS }}
          private_ca_cert_secret_arn: ${{ secrets.PRIVATE_CA_CERT_SECRET_ARN }}

          # DNS & Route53
          hosted_zone_id: ${{ secrets.HOSTED_ZONE_ID }}
          cloudfront_domain: ${{ vars.CLOUDFRONT_DOMAIN }}

          # Storage & Artifacts
          sembix_studio_artifact_s3_bucket: ${{ secrets.SEMBIX_STUDIO_ARTIFACT_S3_BUCKET }}
          sembix_studio_ui_bucket_name: ${{ secrets.SEMBIX_STUDIO_UI_BUCKET_NAME }}
          sembix_artifacts_role_arn: ${{ secrets.SEMBIX_ARTIFACTS_ROLE_ARN }}

          # Frontend configuration.
          vite_github_app_client_id: ${{ vars.VITE_GITHUB_APP_CLIENT_ID }}
          vite_github_app_name: ${{ vars.VITE_GITHUB_APP_NAME }}
          vite_jira_client_id: ${{ vars.VITE_JIRA_CLIENT_ID }}

          # Logging
          log_level: ${{ secrets.LOG_LEVEL }}

          # Module Configuration
          enable_bpa: ${{ vars.ENABLE_BPA }}
          deploy_sembix_studio_notifications: ${{ vars.DEPLOY_SEMBIX_STUDIO_NOTIFICATIONS }}
          enable_bff_waf: ${{ vars.ENABLE_BFF_WAF }}
          run_migrations: 'true'
          deploy_ui: 'true'

          # Approvers
          approvers: ${{ secrets.DEPLOYMENT_APPROVERS }}

          # Azure Authentication
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          # Azure Configuration
          azure_location: ${{ secrets.AZURE_LOCATION }}
          azure_location_short: ${{ secrets.AZURE_LOCATION_SHORT }}

          # Azure TF State
          tf_storage_account_name: ${{ secrets.TF_STORAGE_ACCOUNT_NAME }}
          tf_container_name: ${{ secrets.TF_CONTAINER_NAME }}
          tf_resource_group_name: ${{ secrets.TF_RESOURCE_GROUP_NAME }}

          # Azure Container Images
          workflow_engine_image: ${{ secrets.WORKFLOW_ENGINE_IMAGE }}
          bff_image: ${{ secrets.BFF_IMAGE }}
          semantic_event_engine_image: ${{ secrets.SEMANTIC_EVENT_ENGINE_IMAGE }}
          migrations_image: ${{ secrets.MIGRATIONS_IMAGE }}
          workspace_runtime_image: ${{ secrets.WORKSPACE_RUNTIME_IMAGE }}

          # Azure Database
          postgres_admin_username: ${{ secrets.POSTGRES_ADMIN_USERNAME }}
          postgres_database_name: ${{ secrets.POSTGRES_DATABASE_NAME }}

          # Azure Bootstrap State
          bootstrap_resource_group_name: ${{ secrets.BOOTSTRAP_RESOURCE_GROUP_NAME }}
          bootstrap_storage_account_name: ${{ secrets.BOOTSTRAP_STORAGE_ACCOUNT_NAME }}
          bootstrap_container_name: ${{ secrets.BOOTSTRAP_CONTAINER_NAME }}
          bootstrap_state_key: ${{ secrets.BOOTSTRAP_STATE_KEY }}

          # Azure CDN / Front Door
          front_door_custom_domain: ${{ secrets.FRONT_DOOR_CUSTOM_DOMAIN }}
          front_door_custom_domain_dns_zone_id: ${{ secrets.FRONT_DOOR_CUSTOM_DOMAIN_DNS_ZONE_ID }}

          # Azure Features
          enable_application_insights: ${{ vars.ENABLE_APPLICATION_INSIGHTS }}
          enable_private_endpoints: ${{ vars.ENABLE_PRIVATE_ENDPOINTS }}

          # Azure Custom Identities
          custom_workflow_engine_identity_id: ${{ secrets.CUSTOM_WORKFLOW_ENGINE_IDENTITY_ID }}
          custom_workflow_engine_identity_principal_id: ${{ secrets.CUSTOM_WORKFLOW_ENGINE_PRINCIPAL_ID }}
          custom_workflow_engine_identity_client_id: ${{ secrets.CUSTOM_WORKFLOW_ENGINE_CLIENT_ID }}
          custom_bff_identity_id: ${{ secrets.CUSTOM_BFF_IDENTITY_ID }}
          custom_bff_identity_principal_id: ${{ secrets.CUSTOM_BFF_PRINCIPAL_ID }}
          custom_bff_identity_client_id: ${{ secrets.CUSTOM_BFF_CLIENT_ID }}
          custom_semantic_event_engine_identity_id: ${{ secrets.CUSTOM_SEMANTIC_EVENT_ENGINE_IDENTITY_ID }}
          custom_semantic_event_engine_identity_principal_id: ${{ secrets.CUSTOM_SEMANTIC_EVENT_ENGINE_PRINCIPAL_ID }}
          custom_semantic_event_engine_identity_client_id: ${{ secrets.CUSTOM_SEMANTIC_EVENT_ENGINE_CLIENT_ID }}
          custom_workspace_runtime_identity_id: ${{ secrets.CUSTOM_WORKSPACE_RUNTIME_IDENTITY_ID }}
          custom_workspace_runtime_identity_principal_id: ${{ secrets.CUSTOM_WORKSPACE_RUNTIME_PRINCIPAL_ID }}
          custom_workspace_runtime_identity_client_id: ${{ secrets.CUSTOM_WORKSPACE_RUNTIME_CLIENT_ID }}
          custom_migrations_identity_id: ${{ secrets.CUSTOM_MIGRATIONS_IDENTITY_ID }}
          custom_migrations_identity_principal_id: ${{ secrets.CUSTOM_MIGRATIONS_PRINCIPAL_ID }}
          custom_migrations_identity_client_id: ${{ secrets.CUSTOM_MIGRATIONS_CLIENT_ID }}

  # Step 4: Run migrations only
  run-migrations:
    needs: validate-migrations
    if: inputs.deployment_phase == 'migrations'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: sembix-ai

      - name: Checkout Sembix Studio code
        uses: actions/checkout@v3
        with:
          token: ${{ github.token }}

      - name: Checkout Terraform Infrastructure
        uses: actions/checkout@v3
        with:
          repository: sembix-ai/sembix-studio-infrastructure
          token: ${{ steps.generate-token.outputs.token }}
          path: terraform-infra
          ref: ${{ inputs.terraform_ref }}

      - name: Run Database Migrations
        uses: ./terraform-infra/.github/actions/run-migrations
        with:
          environment: ${{ inputs.environment }}
          migrations_image_tag: ${{ inputs.version }}
          aws_region: ${{ secrets.AWS_REGION }}
          tf_bucket_name: ${{ vars.TF_BUCKET_NAME }}
          customer_role_arn: ${{ secrets.CUSTOMER_ROLE_ARN }}
          require_approval: ${{ inputs.require_approval }}
          github_token: ${{ steps.generate-token.outputs.token }}
          approvers: ${{ secrets.DEPLOYMENT_APPROVERS }}
          migrations_ecr_repository_url: ${{ secrets.MIGRATIONS_ECR_REPOSITORY_URL }}
